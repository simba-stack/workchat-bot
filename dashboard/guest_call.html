<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PRIDE Call · Гость</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at top, #14182c 0%, #0a0e1a 60%);
    color: #e8eef5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 14px; -webkit-font-smoothing: antialiased; overflow: hidden; }
  button { font-family: inherit; }

  /* === Auth screen === */
  .auth-shell { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .auth-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 28px; max-width: 400px; width: 100%; }
  .auth-card h1 { margin: 0 0 4px; font-size: 22px; font-weight: 700; }
  .auth-card p { margin: 0 0 20px; color: rgba(255,255,255,0.6); font-size: 13px; }
  .auth-card label { display: block; font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
  .auth-card input { width: 100%; padding: 12px; margin-bottom: 14px; box-sizing: border-box;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: #fff; font-size: 14px; font-family: inherit; }
  .auth-card button { width: 100%; padding: 14px; background: linear-gradient(135deg, #6ad8ff, #4a9fff);
    color: #0a0e1a; border: none; border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer; }
  .auth-card button:disabled { opacity: 0.4; cursor: not-allowed; }
  .auth-error { padding: 12px; background: rgba(239,68,68,0.12); color: #f87171;
    border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; margin-bottom: 14px; font-size: 13px; }

  /* === Call screen === */
  .call-shell { display: none; flex-direction: column; height: 100vh; }
  .call-shell.active { display: flex; }
  .call-header { padding: 12px 16px; background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .call-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
    box-shadow: 0 0 8px #22c55e; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .call-header h2 { margin: 0; font-size: 15px; font-weight: 700; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .call-header .info { font-size: 12px; color: rgba(255,255,255,0.5); }

  /* === Stage === */
  /* Audio-only mode: круглые аватары компактно по центру (как WhatsApp/Telegram) */
  .stage { flex: 1; padding: 24px; display: flex; align-items: center; justify-content: center;
    overflow: auto; }
  .stage.video-mode { padding: 8px; align-items: stretch; justify-content: stretch; }

  .avatars-wrap { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; align-items: center;
    max-width: 900px; }

  .person { display: flex; flex-direction: column; align-items: center; gap: 10px;
    transition: transform 0.2s; min-width: 120px; }
  .avatar-circle { position: relative; width: 140px; height: 140px; border-radius: 50%;
    background: linear-gradient(135deg, var(--ava-bg-from, #4a9fff), var(--ava-bg-to, #6ad8ff));
    display: flex; align-items: center; justify-content: center;
    font-size: 56px; font-weight: 700; color: #fff;
    border: 3px solid transparent;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    overflow: hidden; }
  .person.speaking .avatar-circle { border-color: #22c55e;
    box-shadow: 0 0 0 6px rgba(34,197,94,0.25), 0 8px 24px rgba(0,0,0,0.4);
    transform: scale(1.04); }
  .person.muted .avatar-circle::after { content: '🔇'; position: absolute; bottom: 4px; right: 4px;
    background: #dc2626; width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; border: 2px solid #0a0e1a; }
  .person.conn-failed .avatar-circle { border-color: #ef4444;
    box-shadow: 0 0 0 6px rgba(239,68,68,0.2), 0 8px 24px rgba(0,0,0,0.4); }
  .person.conn-failed .avatar-circle::before { content: '⚠'; position: absolute; top: 4px; right: 4px;
    background: #dc2626; width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; border: 2px solid #0a0e1a; }
  .person.conn-warn .avatar-circle::before { content: '⏳'; position: absolute; top: 4px; right: 4px;
    background: #f59e0b; width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; border: 2px solid #0a0e1a; }
  .person .name { font-size: 13px; font-weight: 600; max-width: 160px; text-align: center;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .person .status { font-size: 10px; color: rgba(255,255,255,0.5); }

  /* Video tile (когда кто-то включил камеру) */
  .person video { display: none; }
  .person.has-video { width: 280px; }
  .person.has-video .avatar-circle { width: 280px; height: 200px; border-radius: 16px;
    background: #000; padding: 0; overflow: hidden; }
  .person.has-video .avatar-circle .avatar-letter { display: none; }
  .person.has-video video { display: block; width: 100%; height: 100%; object-fit: cover; }
  .person.has-video.local video { transform: scaleX(-1); }

  /* === Global connection error banner === */
  .net-banner { display: none; padding: 12px 16px; background: rgba(239,68,68,0.15);
    border-bottom: 1px solid rgba(239,68,68,0.3); color: #f87171; font-size: 13px;
    text-align: center; flex-shrink: 0; }
  .net-banner.show { display: block; }

  /* === Controls === */
  .controls { padding: 16px; display: flex; gap: 12px; justify-content: center; align-items: center;
    background: rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
    flex-wrap: wrap; }
  .ctrl-btn { width: 54px; height: 54px; border-radius: 50%; background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s; }
  .ctrl-btn:hover { background: rgba(255,255,255,0.18); transform: translateY(-1px); }
  .ctrl-btn.active { background: rgba(245,158,11,0.4); border-color: rgba(245,158,11,0.7); }
  .ctrl-btn.leave { background: #dc2626; border-color: #dc2626; }
  .ctrl-btn.leave:hover { background: #ef4444; }
  .ctrl-status { font-size: 11px; color: rgba(255,255,255,0.5); padding: 0 16px; min-width: 100px; text-align: center; }

  @media (max-width: 600px) {
    .avatar-circle { width: 100px; height: 100px; font-size: 40px; }
    .person.has-video { width: 160px; }
    .person.has-video .avatar-circle { width: 160px; height: 120px; }
    .ctrl-btn { width: 48px; height: 48px; font-size: 18px; }
    .ctrl-status { display: none; }
  }
</style>
</head>
<body>

<!-- Auth screen -->
<div class="auth-shell" id="auth-shell">
  <div class="auth-card">
    <h1>📞 PRIDE Call</h1>
    <p>Введите имя и пароль чтобы войти в звонок.</p>
    <div class="auth-error" id="auth-error" style="display: none;"></div>
    <div id="call-name-display" style="margin-bottom: 14px; padding: 10px; background: rgba(106,216,255,0.08); border: 1px solid rgba(106,216,255,0.2); border-radius: 6px; font-size: 12px; color: #6ad8ff;"></div>
    <label>Ваше имя</label>
    <input id="auth-name" type="text" placeholder="Иван" maxlength="40">
    <label>Пароль</label>
    <input id="auth-password" type="text" placeholder="Введите пароль" autocomplete="off">
    <button id="auth-join">🎙 Войти в звонок</button>
  </div>
</div>

<!-- Call screen -->
<div class="call-shell" id="call-shell">
  <div class="call-header">
    <span class="dot"></span>
    <h2 id="call-title">Звонок</h2>
    <span class="info" id="call-count">0 уч.</span>
  </div>
  <div class="net-banner" id="net-banner">⚠ Не удаётся установить соединение. Проверь интернет / VPN или перезагрузи страницу.</div>
  <div class="stage" id="stage">
    <div class="avatars-wrap" id="avatars-wrap"></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="ctrl-mic" title="Микрофон">🎙</button>
    <button class="ctrl-btn" id="ctrl-cam" title="Камера">📹</button>
    <button class="ctrl-btn" id="ctrl-screen" title="Демонстрация экрана">🖥</button>
    <button class="ctrl-btn leave" id="ctrl-leave" title="Выйти">🚪</button>
    <span class="ctrl-status" id="ctrl-status">подключение…</span>
  </div>
</div>

<script>
const ROOM_ID = window.location.pathname.split('/').filter(Boolean).pop();

// === ICE servers: STUN + несколько TURN серверов разных провайдеров для надёжности ===
// Если все TURN упадут — соединение может не пробить симметричный NAT.
const ICE_SERVERS = [
  // Google STUN
  { urls: ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302",
           "stun:stun2.l.google.com:19302", "stun:stun.cloudflare.com:3478"] },
  // Public TURN от Open Relay Project (Metered) — бесплатные, UDP/TCP, 80/443
  {
    urls: [
      "turn:openrelay.metered.ca:80",
      "turn:openrelay.metered.ca:443",
      "turn:openrelay.metered.ca:443?transport=tcp",
      "turns:openrelay.metered.ca:443",
    ],
    username: "openrelayproject",
    credential: "openrelayproject",
  },
];

const PALETTE = [
  ['#4a9fff', '#6ad8ff'], ['#a855f7', '#d946ef'], ['#22c55e', '#84cc16'],
  ['#f59e0b', '#fbbf24'], ['#ef4444', '#f87171'], ['#06b6d4', '#22d3ee'],
  ['#ec4899', '#f472b6'], ['#8b5cf6', '#a78bfa'],
];

const els = {
  authShell: document.getElementById('auth-shell'),
  authError: document.getElementById('auth-error'),
  callShell: document.getElementById('call-shell'),
  authName: document.getElementById('auth-name'),
  authPassword: document.getElementById('auth-password'),
  authJoin: document.getElementById('auth-join'),
  callNameDisplay: document.getElementById('call-name-display'),
  callTitle: document.getElementById('call-title'),
  callCount: document.getElementById('call-count'),
  stage: document.getElementById('stage'),
  avatarsWrap: document.getElementById('avatars-wrap'),
  netBanner: document.getElementById('net-banner'),
  ctrlMic: document.getElementById('ctrl-mic'),
  ctrlCam: document.getElementById('ctrl-cam'),
  ctrlScreen: document.getElementById('ctrl-screen'),
  ctrlLeave: document.getElementById('ctrl-leave'),
  ctrlStatus: document.getElementById('ctrl-status'),
};

let ws = null;
let localStream = null;
let screenStream = null;
let myId = '';
let myName = '';
let micEnabled = true;
let camEnabled = false;  // По умолчанию камера выключена — audio-only mode
let screenSharing = false;
let audioCtx = null;
const peers = {}; // {participantId: {pc, name, person, remoteStream, audioAnalyser}}

// === Загрузка инфы ===
async function loadInfo() {
  try {
    const r = await fetch(`/api/calls/${ROOM_ID}/info`);
    if (!r.ok) {
      els.callNameDisplay.textContent = '⚠️ Звонок не найден или завершён';
      els.callNameDisplay.style.background = 'rgba(239,68,68,0.12)';
      els.callNameDisplay.style.borderColor = 'rgba(239,68,68,0.3)';
      els.callNameDisplay.style.color = '#f87171';
      els.authJoin.disabled = true;
      return;
    }
    const j = await r.json();
    els.callNameDisplay.textContent = '🎙 ' + (j.name || 'Звонок') + ' · сейчас ' + (j.active_participants?.length || 0) + ' уч.';
    els.callTitle.textContent = j.name || 'Звонок';
  } catch (e) {
    els.callNameDisplay.textContent = 'Ошибка: ' + e.message;
  }
}
loadInfo();
els.authPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') els.authJoin.click(); });

// === Авторизация ===
els.authJoin.addEventListener('click', async () => {
  const name = (els.authName.value || '').trim() || 'Гость';
  const password = (els.authPassword.value || '').trim();
  if (!password) { els.authError.textContent = 'Введите пароль'; els.authError.style.display = 'block'; return; }
  els.authError.style.display = 'none';
  els.authJoin.disabled = true;
  els.authJoin.textContent = '⏳ Подключаемся…';
  try {
    const r = await fetch(`/api/calls/${ROOM_ID}/join`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, password }),
    });
    if (!r.ok) {
      const txt = await r.text();
      els.authError.textContent = r.status === 401 ? '❌ Неверный пароль' : 'Ошибка: ' + txt;
      els.authError.style.display = 'block';
      els.authJoin.disabled = false;
      els.authJoin.textContent = '🎙 Войти в звонок';
      return;
    }
    const j = await r.json();
    myId = j.participant_id;
    myName = j.name;
    // По умолчанию только аудио (как WhatsApp call) — камеру можно потом включить
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      });
    } catch (e) {
      console.warn('No mic:', e);
      alert('Не удалось получить доступ к микрофону. Войдём только слушать.');
      localStream = new MediaStream();
    }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    els.authShell.style.display = 'none';
    els.callShell.classList.add('active');
    addPerson(myId, myName, true);
    if (localStream) attachLocalVADetector();
    connectWebSocket();
  } catch (e) {
    els.authError.textContent = 'Ошибка: ' + e.message;
    els.authError.style.display = 'block';
    els.authJoin.disabled = false;
    els.authJoin.textContent = '🎙 Войти в звонок';
  }
});

// === WebSocket ===
function connectWebSocket() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws-guest-call?room_id=${ROOM_ID}&participant_id=${myId}`;
  ws = new WebSocket(url);
  ws.onopen = () => { setStatus('✓ подключён'); };
  ws.onclose = () => { setStatus('✗ соединение разорвано'); showNetBanner(true); };
  ws.onerror = (e) => console.warn('WS err:', e);
  ws.onmessage = async (ev) => {
    let msg = null;
    try { msg = JSON.parse(ev.data); } catch (e) { return; }
    if (msg.type === 'ready') {
      for (const p of (msg.peers || [])) {
        await createPeerConnection(p.participant_id, p.name, true);
      }
      updateCount();
    } else if (msg.type === 'peer-joined') {
      await createPeerConnection(msg.participant.participant_id, msg.participant.name, false);
      updateCount();
    } else if (msg.type === 'peer-left') {
      closePeer(msg.participant_id);
      updateCount();
    } else if (msg.type === 'signal') {
      await handleSignal(msg.from, msg.payload);
    }
  };
}

// === WebRTC ===
async function createPeerConnection(peerId, peerName, initiator) {
  if (peers[peerId]) return peers[peerId].pc;
  console.log('[WebRTC] createPeerConnection', peerId, peerName, 'initiator=', initiator);
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS, iceTransportPolicy: 'all' });
  const remoteStream = new MediaStream();
  peers[peerId] = { pc, name: peerName, person: null, remoteStream, audioAnalyser: null };

  // Создаём person сразу (даже до tracks) — чтобы был placeholder
  addPerson(peerId, peerName, false);

  // Add local tracks
  if (localStream) {
    for (const tr of localStream.getTracks()) pc.addTrack(tr, localStream);
  }

  pc.ontrack = (ev) => {
    if (ev.track && !remoteStream.getTracks().some(t => t.id === ev.track.id)) {
      remoteStream.addTrack(ev.track);
    }
    const p = peers[peerId];
    if (!p) return;
    // Audio: создаём <audio> для воспроизведения
    if (ev.track.kind === 'audio') {
      ensureAudioPlayback(peerId, remoteStream);
      ensureVADetector(peerId, remoteStream);
    }
    // Video: показываем в person.video
    if (ev.track.kind === 'video') {
      if (p.person) p.person.classList.add('has-video');
      const v = p.person?.querySelector('video');
      if (v) { v.srcObject = remoteStream; v.play().catch(() => {}); }
    }
  };

  pc.onicecandidate = (ev) => {
    if (ev.candidate && ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'signal', target: peerId,
                               payload: { kind: 'ice', candidate: ev.candidate } }));
    }
  };

  pc.oniceconnectionstatechange = () => {
    console.log('[WebRTC]', peerId, 'iceState=', pc.iceConnectionState);
    updateConnBadge(peerId, pc.iceConnectionState);
  };
  pc.onconnectionstatechange = () => {
    console.log('[WebRTC]', peerId, 'connState=', pc.connectionState);
    if (pc.connectionState === 'failed') {
      try { pc.restartIce(); } catch (e) {}
    }
  };

  if (initiator) {
    try {
      const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: true });
      await pc.setLocalDescription(offer);
      ws.send(JSON.stringify({ type: 'signal', target: peerId,
                               payload: { kind: 'offer', sdp: offer } }));
    } catch (e) { console.error('createOffer fail:', e); }
  }
  return pc;
}

async function handleSignal(fromId, payload) {
  let entry = peers[fromId];
  if (!entry) {
    await createPeerConnection(fromId, 'Гость', false);
    entry = peers[fromId];
  }
  const pc = entry.pc;
  if (payload.kind === 'offer') {
    await pc.setRemoteDescription(payload.sdp);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    ws.send(JSON.stringify({ type: 'signal', target: fromId,
                             payload: { kind: 'answer', sdp: answer } }));
  } else if (payload.kind === 'answer') {
    await pc.setRemoteDescription(payload.sdp);
  } else if (payload.kind === 'ice') {
    try { await pc.addIceCandidate(payload.candidate); } catch (e) {}
  }
}

function closePeer(peerId) {
  const p = peers[peerId];
  if (!p) return;
  try { p.pc.close(); } catch (e) {}
  if (p.person) p.person.remove();
  const aud = document.querySelector(`audio[data-peer="${peerId}"]`);
  if (aud) aud.remove();
  delete peers[peerId];
}

function updateConnBadge(peerId, state) {
  const p = peers[peerId];
  if (!p || !p.person) return;
  p.person.classList.remove('conn-warn', 'conn-failed');
  if (state === 'connected' || state === 'completed') {
    // OK
  } else if (state === 'checking' || state === 'new') {
    p.person.classList.add('conn-warn');
  } else if (state === 'failed') {
    p.person.classList.add('conn-failed');
  } else if (state === 'disconnected') {
    p.person.classList.add('conn-warn');
  }
  // Показываем баннер только если ВСЕ peers сломаны (нет ни одного рабочего).
  // Раньше баннер вылетал если хоть один peer failed — но в mesh-звонке
  // один failed peer не мешает остальным: голос идёт через работающие.
  // Это слишком агрессивно пугало пользователей.
  const peerIds = Object.keys(peers);
  let anyWorking = false;
  let anyFailed = false;
  for (const pid of peerIds) {
    const st = peers[pid].pc?.iceConnectionState;
    if (st === 'connected' || st === 'completed' || st === 'checking' || st === 'new') {
      anyWorking = true;
    }
    if (st === 'failed') anyFailed = true;
  }
  // Показываем только если ВСЕ failed и ни одного рабочего нет
  const noConnection = peerIds.length > 0 && anyFailed && !anyWorking;
  showNetBanner(noConnection);
}

function showNetBanner(show) {
  els.netBanner.classList.toggle('show', show);
}

// === UI ===
function addPerson(peerId, peerName, isLocal) {
  const existing = document.querySelector(`[data-person="${peerId}"]`);
  if (existing) return existing;
  const person = document.createElement('div');
  person.className = 'person' + (isLocal ? ' local' : '');
  person.dataset.person = peerId;
  // Цвет аватара (детерминированный по peerId)
  let hash = 0;
  for (const c of peerId) hash = (hash * 31 + c.charCodeAt(0)) | 0;
  const [from, to] = PALETTE[Math.abs(hash) % PALETTE.length];
  person.style.setProperty('--ava-bg-from', from);
  person.style.setProperty('--ava-bg-to', to);

  const circle = document.createElement('div');
  circle.className = 'avatar-circle';
  const letter = document.createElement('span');
  letter.className = 'avatar-letter';
  letter.textContent = ((peerName || '?')[0] || '?').toUpperCase();
  circle.appendChild(letter);
  // Video (внутри circle, скрыт если нет video track)
  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;
  video.muted = isLocal;
  circle.appendChild(video);
  person.appendChild(circle);

  const name = document.createElement('div');
  name.className = 'name';
  name.textContent = (isLocal ? '(Вы) ' : '') + (peerName || 'Гость');
  person.appendChild(name);

  els.avatarsWrap.appendChild(person);
  if (peers[peerId]) peers[peerId].person = person;
  // Для local: если есть video tracks, сразу show video
  if (isLocal && localStream && localStream.getVideoTracks().length > 0) {
    person.classList.add('has-video');
    video.srcObject = localStream;
  }
  // Если у локального уже включена камера потом — установим
  return person;
}

function ensureAudioPlayback(peerId, stream) {
  // Создаём отдельный <audio> для каждого peer (autoplay) — гарантирует звук
  let aud = document.querySelector(`audio[data-peer="${peerId}"]`);
  if (!aud) {
    aud = document.createElement('audio');
    aud.dataset.peer = peerId;
    aud.autoplay = true;
    aud.playsInline = true;
    aud.controls = false;
    aud.style.display = 'none';
    document.body.appendChild(aud);
  }
  aud.srcObject = stream;
  aud.play().catch(() => {});
}

function ensureVADetector(peerId, stream) {
  // Speaking detection через Web Audio API
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  const audioTrack = stream.getAudioTracks()[0];
  if (!audioTrack) return;
  const p = peers[peerId];
  if (!p || p.audioAnalyser) return;
  try {
    const source = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.6;
    source.connect(analyser);
    p.audioAnalyser = analyser;
    const data = new Uint8Array(analyser.frequencyBinCount);
    function tick() {
      if (!peers[peerId]) return;
      analyser.getByteFrequencyData(data);
      let sum = 0; for (let i = 0; i < data.length; i++) sum += data[i];
      const avg = sum / data.length;
      const speaking = avg > 15;
      p.person?.classList.toggle('speaking', speaking);
      requestAnimationFrame(tick);
    }
    tick();
  } catch (e) { console.warn('VA detector fail:', e); }
}

function attachLocalVADetector() {
  if (!localStream || !audioCtx) return;
  const audioTrack = localStream.getAudioTracks()[0];
  if (!audioTrack) return;
  try {
    const source = audioCtx.createMediaStreamSource(localStream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.6;
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    const myPerson = document.querySelector(`[data-person="${myId}"]`);
    function tick() {
      analyser.getByteFrequencyData(data);
      let sum = 0; for (let i = 0; i < data.length; i++) sum += data[i];
      const avg = sum / data.length;
      const speaking = avg > 15 && micEnabled;
      myPerson?.classList.toggle('speaking', speaking);
      requestAnimationFrame(tick);
    }
    tick();
  } catch (e) { console.warn('local VA fail:', e); }
}

function updateCount() {
  const count = Object.keys(peers).length + 1;
  els.callCount.textContent = count + ' уч.';
}

function setStatus(text) { els.ctrlStatus.textContent = text; }

// === Controls ===
els.ctrlMic.addEventListener('click', () => {
  micEnabled = !micEnabled;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
  els.ctrlMic.textContent = micEnabled ? '🎙' : '🔇';
  els.ctrlMic.classList.toggle('active', !micEnabled);
  const myPerson = document.querySelector(`[data-person="${myId}"]`);
  if (myPerson) myPerson.classList.toggle('muted', !micEnabled);
});

els.ctrlCam.addEventListener('click', async () => {
  if (camEnabled) {
    // Выключаем камеру — убираем video tracks
    if (localStream) {
      localStream.getVideoTracks().forEach(t => { t.stop(); localStream.removeTrack(t); });
    }
    for (const peerId in peers) {
      const sender = peers[peerId].pc.getSenders().find(s => s.track?.kind === 'video');
      if (sender) { try { peers[peerId].pc.removeTrack(sender); } catch (e) {} }
    }
    const myPerson = document.querySelector(`[data-person="${myId}"]`);
    if (myPerson) myPerson.classList.remove('has-video');
    camEnabled = false;
    els.ctrlCam.classList.remove('active');
    els.ctrlCam.textContent = '📹';
    return;
  }
  try {
    const camStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
    const videoTrack = camStream.getVideoTracks()[0];
    if (!videoTrack) return;
    if (!localStream) localStream = new MediaStream();
    localStream.addTrack(videoTrack);
    for (const peerId in peers) {
      try { peers[peerId].pc.addTrack(videoTrack, localStream); } catch (e) {}
      // renegotiate (отправим новый offer)
      try {
        const offer = await peers[peerId].pc.createOffer();
        await peers[peerId].pc.setLocalDescription(offer);
        ws.send(JSON.stringify({ type: 'signal', target: peerId, payload: { kind: 'offer', sdp: offer } }));
      } catch (e) { console.warn('renegotiate fail', e); }
    }
    const myPerson = document.querySelector(`[data-person="${myId}"]`);
    if (myPerson) {
      myPerson.classList.add('has-video');
      const v = myPerson.querySelector('video');
      if (v) v.srcObject = localStream;
    }
    camEnabled = true;
    els.ctrlCam.classList.add('active');
    els.ctrlCam.textContent = '📷';
  } catch (e) {
    alert('Не удалось включить камеру: ' + e.message);
  }
});

els.ctrlScreen.addEventListener('click', async () => {
  if (screenSharing) {
    if (screenStream) screenStream.getTracks().forEach(t => t.stop());
    screenStream = null;
    screenSharing = false;
    els.ctrlScreen.classList.remove('active');
    // Если камера есть — вернём её. Иначе уберём video
    const camTrack = localStream?.getVideoTracks().find(t => t.label !== 'screen-share') || null;
    for (const peerId in peers) {
      const sender = peers[peerId].pc.getSenders().find(s => s.track?.kind === 'video');
      if (sender) {
        if (camTrack) await sender.replaceTrack(camTrack);
        else { try { peers[peerId].pc.removeTrack(sender); } catch (e) {} }
      }
    }
    return;
  }
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
    screenSharing = true;
    els.ctrlScreen.classList.add('active');
    const screenTrack = screenStream.getVideoTracks()[0];
    for (const peerId in peers) {
      const sender = peers[peerId].pc.getSenders().find(s => s.track?.kind === 'video');
      if (sender) await sender.replaceTrack(screenTrack);
      else peers[peerId].pc.addTrack(screenTrack, screenStream);
    }
    screenTrack.onended = () => els.ctrlScreen.click();
  } catch (e) { console.warn('screen share fail:', e); }
});

els.ctrlLeave.addEventListener('click', () => {
  if (ws && ws.readyState === 1) {
    try { ws.send(JSON.stringify({ type: 'leave' })); } catch (e) {}
    ws.close();
  }
  for (const pid in peers) closePeer(pid);
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#888;font-size:16px;text-align:center;padding:20px;">👋 Звонок завершён.<br><br>Можно закрыть вкладку.</div>';
});

// Keepalive
setInterval(() => {
  if (ws && ws.readyState === 1) {
    try { ws.send(JSON.stringify({ type: 'ping' })); } catch (e) {}
  }
}, 25000);
</script>
