<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PRIDE Call · Гость</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0e1a;
    color: #e8eef5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 14px; -webkit-font-smoothing: antialiased; overflow: hidden; }
  button { font-family: inherit; }

  /* === Auth screen === */
  .auth-shell { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .auth-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 28px; max-width: 400px; width: 100%; }
  .auth-card h1 { margin: 0 0 4px; font-size: 22px; font-weight: 700; }
  .auth-card p { margin: 0 0 20px; color: rgba(255,255,255,0.6); font-size: 13px; }
  .auth-card label { display: block; font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
  .auth-card input { width: 100%; padding: 12px; margin-bottom: 14px; box-sizing: border-box;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: #fff; font-size: 14px; font-family: inherit; }
  .auth-card button { width: 100%; padding: 14px; background: linear-gradient(135deg, #6ad8ff, #4a9fff);
    color: #0a0e1a; border: none; border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer; }
  .auth-card button:disabled { opacity: 0.4; cursor: not-allowed; }
  .auth-error { padding: 12px; background: rgba(239,68,68,0.12); color: #f87171;
    border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; margin-bottom: 14px; font-size: 13px; }

  /* === Call screen === */
  .call-shell { display: none; flex-direction: column; height: 100vh; }
  .call-shell.active { display: flex; }
  .call-header { padding: 10px 16px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .call-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e;
    animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  .call-header h2 { margin: 0; font-size: 14px; font-weight: 700; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .call-header .info { font-size: 11px; color: rgba(255,255,255,0.5); }

  /* === Videos grid — адаптивный layout под количество tile'ов === */
  .videos-grid { flex: 1; padding: 8px; display: grid; gap: 8px; overflow: hidden;
    grid-template-columns: 1fr; grid-template-rows: 1fr;
    align-content: stretch; }
  .videos-grid[data-count="1"] { grid-template-columns: 1fr; }
  .videos-grid[data-count="2"] { grid-template-columns: 1fr 1fr; }
  .videos-grid[data-count="3"], .videos-grid[data-count="4"] {
    grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .videos-grid[data-count="5"], .videos-grid[data-count="6"] {
    grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .videos-grid[data-count="7"], .videos-grid[data-count="8"], .videos-grid[data-count="9"] {
    grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
  .videos-grid[data-count="10"] {
    grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }

  .video-tile { position: relative; background: linear-gradient(135deg, #1a1f30, #0a0e1a);
    border-radius: 12px; overflow: hidden;
    border: 2px solid transparent; transition: border-color 0.2s, box-shadow 0.2s;
    min-height: 0; min-width: 0; }
  .video-tile.speaking { border-color: #22c55e; box-shadow: 0 0 16px rgba(34,197,94,0.5); }
  .video-tile video { width: 100%; height: 100%; object-fit: cover; background: #000; display: block; }
  .video-tile.local video { transform: scaleX(-1); }
  .video-tile .avatar { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 64px; font-weight: 700; color: rgba(255,255,255,0.5);
    background: linear-gradient(135deg, #1a3a5c, #2a5a8c); }
  .video-tile.has-video .avatar { display: none; }
  .video-tile .name { position: absolute; bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
    max-width: calc(100% - 20px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .video-tile .badges { position: absolute; top: 10px; right: 10px; display: flex; gap: 4px; }
  .video-tile .badge { background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px;
    font-size: 11px; backdrop-filter: blur(6px); }
  .video-tile .badge.muted { background: rgba(239,68,68,0.85); }
  .video-tile .badge.conn-warn { background: rgba(245,158,11,0.85); }
  .video-tile .badge.conn-fail { background: rgba(239,68,68,0.85); }
  .video-tile .audio-meter { position: absolute; left: 10px; bottom: 40px; width: 4px; height: 20px;
    background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .video-tile .audio-meter::after { content:''; display: block; width: 100%; height: 0%;
    background: #22c55e; transition: height 0.1s; }

  /* === Controls === */
  .controls { padding: 14px; display: flex; gap: 10px; justify-content: center; align-items: center;
    background: rgba(0,0,0,0.6); border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
    flex-wrap: wrap; }
  .ctrl-btn { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.1s; }
  .ctrl-btn:hover { background: rgba(255,255,255,0.18); transform: translateY(-1px); }
  .ctrl-btn.active { background: rgba(245,158,11,0.4); border-color: rgba(245,158,11,0.7); }
  .ctrl-btn.leave { background: #dc2626; border-color: #dc2626; }
  .ctrl-btn.leave:hover { background: #ef4444; }
  .ctrl-status { font-size: 11px; color: rgba(255,255,255,0.5); padding: 0 16px; min-width: 100px; text-align: center; }
</style>
</head>
<body>

<!-- Auth screen -->
<div class="auth-shell" id="auth-shell">
  <div class="auth-card">
    <h1>📞 PRIDE Call</h1>
    <p>Введите имя и пароль чтобы войти в звонок.</p>
    <div class="auth-error" id="auth-error" style="display: none;"></div>
    <div id="call-name-display" style="margin-bottom: 14px; padding: 10px; background: rgba(106,216,255,0.08); border: 1px solid rgba(106,216,255,0.2); border-radius: 6px; font-size: 12px; color: #6ad8ff;"></div>
    <label>Ваше имя</label>
    <input id="auth-name" type="text" placeholder="Иван" maxlength="40">
    <label>Пароль</label>
    <input id="auth-password" type="text" placeholder="Введите пароль" autocomplete="off">
    <button id="auth-join">🎙 Войти в звонок</button>
  </div>
</div>

<!-- Call screen -->
<div class="call-shell" id="call-shell">
  <div class="call-header">
    <span class="dot"></span>
    <h2 id="call-title">Звонок</h2>
    <span class="info" id="call-count">0 уч.</span>
  </div>
  <div class="videos-grid" id="videos-grid" data-count="1"></div>
  <div class="controls">
    <button class="ctrl-btn" id="ctrl-mic" title="Микрофон">🎙</button>
    <button class="ctrl-btn" id="ctrl-cam" title="Камера">📹</button>
    <button class="ctrl-btn" id="ctrl-screen" title="Демонстрация экрана">🖥</button>
    <button class="ctrl-btn leave" id="ctrl-leave" title="Выйти">🚪</button>
    <span class="ctrl-status" id="ctrl-status">подключение…</span>
  </div>
</div>

<script>
const ROOM_ID = window.location.pathname.split('/').filter(Boolean).pop();

// === ICE: STUN + бесплатный TURN от openrelayproject (работает через NAT/firewall) ===
// Если TURN-серверы упали — можно добавить свой (coturn) или взять платный (Twilio/Xirsys).
const ICE_SERVERS = [
  { urls: ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302"] },
  // Публичный TURN — для NAT/firewall traversal
  {
    urls: [
      "turn:openrelay.metered.ca:80",
      "turn:openrelay.metered.ca:443",
      "turn:openrelay.metered.ca:443?transport=tcp",
    ],
    username: "openrelayproject",
    credential: "openrelayproject",
  },
];

const els = {
  authShell: document.getElementById('auth-shell'),
  authError: document.getElementById('auth-error'),
  callShell: document.getElementById('call-shell'),
  authName: document.getElementById('auth-name'),
  authPassword: document.getElementById('auth-password'),
  authJoin: document.getElementById('auth-join'),
  callNameDisplay: document.getElementById('call-name-display'),
  callTitle: document.getElementById('call-title'),
  callCount: document.getElementById('call-count'),
  videosGrid: document.getElementById('videos-grid'),
  ctrlMic: document.getElementById('ctrl-mic'),
  ctrlCam: document.getElementById('ctrl-cam'),
  ctrlScreen: document.getElementById('ctrl-screen'),
  ctrlLeave: document.getElementById('ctrl-leave'),
  ctrlStatus: document.getElementById('ctrl-status'),
};

let ws = null;
let localStream = null;
let screenStream = null;
let myId = '';
let myName = '';
let micEnabled = true;
let camEnabled = true;
let screenSharing = false;
const peers = {}; // {participantId: {pc, name, videoEl, tileEl}}

// === Загрузка инфы ===
async function loadInfo() {
  try {
    const r = await fetch(`/api/calls/${ROOM_ID}/info`);
    if (!r.ok) {
      els.callNameDisplay.textContent = '⚠️ Звонок не найден или завершён';
      els.callNameDisplay.style.background = 'rgba(239,68,68,0.12)';
      els.callNameDisplay.style.borderColor = 'rgba(239,68,68,0.3)';
      els.callNameDisplay.style.color = '#f87171';
      els.authJoin.disabled = true;
      return;
    }
    const j = await r.json();
    els.callNameDisplay.textContent = '🎙 ' + (j.name || 'Звонок') + ' · сейчас ' + (j.active_participants?.length || 0) + ' уч.';
    els.callTitle.textContent = j.name || 'Звонок';
  } catch (e) {
    els.callNameDisplay.textContent = 'Ошибка: ' + e.message;
  }
}
loadInfo();

els.authPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') els.authJoin.click(); });

// === Авторизация ===
els.authJoin.addEventListener('click', async () => {
  const name = (els.authName.value || '').trim() || 'Гость';
  const password = (els.authPassword.value || '').trim();
  if (!password) { els.authError.textContent = 'Введите пароль'; els.authError.style.display = 'block'; return; }
  els.authError.style.display = 'none';
  els.authJoin.disabled = true;
  els.authJoin.textContent = '⏳ Запрашиваем доступ…';
  try {
    const r = await fetch(`/api/calls/${ROOM_ID}/join`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, password }),
    });
    if (!r.ok) {
      const txt = await r.text();
      els.authError.textContent = r.status === 401 ? '❌ Неверный пароль' : 'Ошибка: ' + txt;
      els.authError.style.display = 'block';
      els.authJoin.disabled = false;
      els.authJoin.textContent = '🎙 Войти в звонок';
      return;
    }
    const j = await r.json();
    myId = j.participant_id;
    myName = j.name;
    // Запрашиваем камеру/мик с качественными audio constraints
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      });
    } catch (e) {
      console.warn('Camera failed, trying audio-only:', e);
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
        });
      } catch (e2) {
        console.warn('No mic/cam:', e2);
        alert('Не удалось получить доступ к камере/микрофону. Войдём без них (только смотреть).');
        localStream = new MediaStream();
      }
    }
    els.authShell.style.display = 'none';
    els.callShell.classList.add('active');
    addVideoTile(myId, myName, localStream, true);
    connectWebSocket();
  } catch (e) {
    els.authError.textContent = 'Ошибка: ' + e.message;
    els.authError.style.display = 'block';
    els.authJoin.disabled = false;
    els.authJoin.textContent = '🎙 Войти в звонок';
  }
});

// === WebSocket signaling ===
function connectWebSocket() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws-guest-call?room_id=${ROOM_ID}&participant_id=${myId}`;
  ws = new WebSocket(url);
  ws.onopen = () => { setStatus('✓ подключён'); };
  ws.onclose = () => { setStatus('✗ соединение разорвано'); };
  ws.onerror = (e) => console.warn('WS err:', e);
  ws.onmessage = async (ev) => {
    let msg = null;
    try { msg = JSON.parse(ev.data); } catch (e) { return; }
    if (msg.type === 'ready') {
      // Initiator: создаём PC для каждого уже-в-комнате
      for (const p of (msg.peers || [])) {
        await createPeerConnection(p.participant_id, p.name, true);
      }
      updateGrid();
    } else if (msg.type === 'peer-joined') {
      // Не initiator: новый peer создаст offer сам
      await createPeerConnection(msg.participant.participant_id, msg.participant.name, false);
      updateGrid();
    } else if (msg.type === 'peer-left') {
      closePeer(msg.participant_id);
      updateGrid();
    } else if (msg.type === 'signal') {
      await handleSignal(msg.from, msg.payload);
    } else if (msg.type === 'pong') {
      // ok
    }
  };
}

// === WebRTC peer connection ===
async function createPeerConnection(peerId, peerName, initiator) {
  if (peers[peerId]) return peers[peerId].pc;
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS, iceTransportPolicy: 'all' });
  peers[peerId] = { pc, name: peerName, videoEl: null, tileEl: null, remoteStream: new MediaStream() };
  // Создаём tile сразу с placeholder (аватаром) — даже до прихода первого track
  addVideoTile(peerId, peerName, peers[peerId].remoteStream, false);

  // Add local tracks (audio first — критично для звука!)
  if (localStream) {
    for (const tr of localStream.getTracks()) {
      pc.addTrack(tr, localStream);
    }
  }

  // Когда приходят remote tracks — добавляем в remoteStream
  pc.ontrack = (ev) => {
    const stream = peers[peerId]?.remoteStream;
    if (!stream) return;
    if (ev.track && !stream.getTracks().some(t => t.id === ev.track.id)) {
      stream.addTrack(ev.track);
    }
    // Re-bind в видеоэлемент чтобы триггернуть автоплей
    const v = peers[peerId]?.videoEl;
    if (v && v.srcObject !== stream) v.srcObject = stream;
    // Помечаем что появилось видео — скроется аватар-плейсхолдер
    if (ev.track.kind === 'video' && peers[peerId]?.tileEl) {
      peers[peerId].tileEl.classList.add('has-video');
    }
    // Autoplay-фикс для Safari/строгого autoplay policy
    if (v) {
      v.play().catch(() => {});
    }
  };

  pc.onicecandidate = (ev) => {
    if (ev.candidate && ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'signal', target: peerId,
                               payload: { kind: 'ice', candidate: ev.candidate } }));
    }
  };

  // Tracking connection state — НЕ убиваем peer на 'disconnected' (это временно!)
  pc.onconnectionstatechange = () => {
    const st = pc.connectionState;
    const tile = peers[peerId]?.tileEl;
    if (!tile) return;
    // Обновляем badge статуса
    let warn = tile.querySelector('.badge.conn-warn');
    let fail = tile.querySelector('.badge.conn-fail');
    if (warn) warn.remove();
    if (fail) fail.remove();
    if (st === 'connecting' || st === 'new') {
      const b = document.createElement('div'); b.className = 'badge conn-warn'; b.textContent = '⏳';
      tile.querySelector('.badges').appendChild(b);
    } else if (st === 'failed') {
      const b = document.createElement('div'); b.className = 'badge conn-fail'; b.textContent = '⚠';
      tile.querySelector('.badges').appendChild(b);
      // Попробуем пересоздать с iceRestart
      try { restartIce(peerId); } catch (e) { console.warn('iceRestart fail', e); }
    } else if (st === 'disconnected') {
      const b = document.createElement('div'); b.className = 'badge conn-warn'; b.textContent = '🔄';
      tile.querySelector('.badges').appendChild(b);
      // НЕ закрываем — даём время восстановиться (часто это короткие сетевые лаги)
    }
    // На 'closed' tile удалится через closePeer (когда WS пришлёт peer-left или мы сами вызовем)
  };

  if (initiator) {
    try {
      const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: true });
      await pc.setLocalDescription(offer);
      ws.send(JSON.stringify({ type: 'signal', target: peerId,
                               payload: { kind: 'offer', sdp: offer } }));
    } catch (e) { console.error('createOffer fail:', e); }
  }
  return pc;
}

async function restartIce(peerId) {
  const entry = peers[peerId];
  if (!entry || !entry.pc) return;
  try {
    const offer = await entry.pc.createOffer({ iceRestart: true });
    await entry.pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: 'signal', target: peerId,
                             payload: { kind: 'offer', sdp: offer } }));
  } catch (e) { console.warn('iceRestart failed', e); }
}

async function handleSignal(fromId, payload) {
  let entry = peers[fromId];
  if (!entry) {
    await createPeerConnection(fromId, 'Гость', false);
    entry = peers[fromId];
  }
  const pc = entry.pc;
  if (payload.kind === 'offer') {
    await pc.setRemoteDescription(payload.sdp);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    ws.send(JSON.stringify({ type: 'signal', target: fromId,
                             payload: { kind: 'answer', sdp: answer } }));
  } else if (payload.kind === 'answer') {
    await pc.setRemoteDescription(payload.sdp);
  } else if (payload.kind === 'ice') {
    try { await pc.addIceCandidate(payload.candidate); } catch (e) { /* silent */ }
  }
}

function closePeer(peerId) {
  const p = peers[peerId];
  if (!p) return;
  try { p.pc.close(); } catch (e) {}
  if (p.tileEl) p.tileEl.remove();
  delete peers[peerId];
}

function updateGrid() {
  const count = Object.keys(peers).length + 1;  // +1 — я
  els.callCount.textContent = count + ' уч.';
  els.videosGrid.dataset.count = String(Math.min(count, 10));
}

// === UI ===
function addVideoTile(peerId, peerName, stream, isLocal) {
  const existing = document.querySelector(`[data-peer="${peerId}"]`);
  if (existing) {
    const v = existing.querySelector('video');
    if (v && stream) v.srcObject = stream;
    return existing;
  }
  const tile = document.createElement('div');
  tile.className = 'video-tile' + (isLocal ? ' local' : '');
  tile.dataset.peer = peerId;

  // Аватар-плейсхолдер (показывается пока нет video track)
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = (peerName || '?')[0].toUpperCase();
  tile.appendChild(avatar);

  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;
  video.muted = isLocal;  // mute свой stream (чтобы не было echo)
  if (stream) video.srcObject = stream;
  tile.appendChild(video);

  const name = document.createElement('div');
  name.className = 'name';
  name.textContent = (isLocal ? '(Вы) ' : '') + (peerName || 'Гость');
  tile.appendChild(name);

  const badges = document.createElement('div');
  badges.className = 'badges';
  tile.appendChild(badges);

  els.videosGrid.appendChild(tile);
  // Local — сразу has-video, чтобы скрыть аватар
  if (isLocal && localStream && localStream.getVideoTracks().length > 0) {
    tile.classList.add('has-video');
  }
  if (peers[peerId]) { peers[peerId].videoEl = video; peers[peerId].tileEl = tile; }
  return tile;
}

function setStatus(text) {
  els.ctrlStatus.textContent = text;
}

// === Controls ===
els.ctrlMic.addEventListener('click', () => {
  micEnabled = !micEnabled;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
  els.ctrlMic.textContent = micEnabled ? '🎙' : '🔇';
  els.ctrlMic.classList.toggle('active', !micEnabled);
  updateMyBadges();
});
els.ctrlCam.addEventListener('click', () => {
  camEnabled = !camEnabled;
  if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
  els.ctrlCam.textContent = camEnabled ? '📹' : '📷';
  els.ctrlCam.classList.toggle('active', !camEnabled);
  const myTile = document.querySelector(`[data-peer="${myId}"]`);
  if (myTile) myTile.classList.toggle('has-video', camEnabled);
});
function updateMyBadges() {
  const myTile = document.querySelector(`[data-peer="${myId}"]`);
  if (!myTile) return;
  const badges = myTile.querySelector('.badges');
  if (!badges) return;
  badges.innerHTML = '';
  if (!micEnabled) {
    const b = document.createElement('div'); b.className = 'badge muted'; b.textContent = '🔇';
    badges.appendChild(b);
  }
}

els.ctrlScreen.addEventListener('click', async () => {
  if (screenSharing) {
    if (screenStream) screenStream.getTracks().forEach(t => t.stop());
    screenStream = null;
    screenSharing = false;
    els.ctrlScreen.classList.remove('active');
    if (localStream) {
      const camTrack = localStream.getVideoTracks()[0];
      for (const peerId in peers) {
        const sender = peers[peerId].pc.getSenders().find(s => s.track?.kind === 'video');
        if (sender && camTrack) await sender.replaceTrack(camTrack);
      }
      const myTile = document.querySelector(`[data-peer="${myId}"] video`);
      if (myTile) myTile.srcObject = localStream;
    }
    return;
  }
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
    screenSharing = true;
    els.ctrlScreen.classList.add('active');
    const screenTrack = screenStream.getVideoTracks()[0];
    if (screenTrack) {
      for (const peerId in peers) {
        const sender = peers[peerId].pc.getSenders().find(s => s.track?.kind === 'video');
        if (sender) await sender.replaceTrack(screenTrack);
      }
      const myTile = document.querySelector(`[data-peer="${myId}"] video`);
      if (myTile) myTile.srcObject = screenStream;
      const myTileEl = document.querySelector(`[data-peer="${myId}"]`);
      if (myTileEl) myTileEl.classList.add('has-video');
      screenTrack.onended = () => els.ctrlScreen.click();
    }
  } catch (e) { console.warn('screen share fail:', e); }
});

els.ctrlLeave.addEventListener('click', () => {
  if (ws && ws.readyState === 1) {
    try { ws.send(JSON.stringify({ type: 'leave' })); } catch (e) {}
    ws.close();
  }
  for (const pid in peers) closePeer(pid);
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#888;font-size:16px;text-align:center;padding:20px;">👋 Звонок завершён.<br><br>Можно закрыть вкладку.</div>';
});

// Keepalive ping
setInterval(() => {
  if (ws && ws.readyState === 1) {
    try { ws.send(JSON.stringify({ type: 'ping' })); } catch (e) {}
  }
}, 25000);
</script>
