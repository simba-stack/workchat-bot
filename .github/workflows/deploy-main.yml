name: Deploy Main App to Railway

# =============================================================================
# Auto-deploy основного workchat-bot сервиса на Railway.
#
# Опционально — Railway уже подключен к GitHub-репо и сам деплоит при push.
# Этот workflow только для случая если auto-deploy отключен или нужно вручную.
#
# Требуемые GitHub Secrets:
#   RAILWAY_TOKEN
#   RAILWAY_PROJECT_ID
#   RAILWAY_MAIN_SERVICE — название main сервиса (по умолчанию 'workchat-bot')
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Railway service name (override default)"
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy main app to Railway
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Verify RAILWAY_TOKEN
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::error::RAILWAY_TOKEN missing"; exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli
          railway --version

      - name: Determine service name
        id: svc
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          if [ -z "$SERVICE" ]; then
            SERVICE="${{ secrets.RAILWAY_MAIN_SERVICE }}"
          fi
          if [ -z "$SERVICE" ]; then
            SERVICE="workchat-bot"
          fi
          echo "service=$SERVICE" >> $GITHUB_OUTPUT

      - name: Link project
        if: ${{ secrets.RAILWAY_PROJECT_ID != '' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --project ${{ secrets.RAILWAY_PROJECT_ID }} \
                       --service ${{ steps.svc.outputs.service }} \
                       --environment production || echo "Link warning"

      - name: Deploy via railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service "${{ steps.svc.outputs.service }}" --detach
