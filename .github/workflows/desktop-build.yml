name: Desktop Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write   # нужно для electron-builder publish → GitHub Releases
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install npm deps
        working-directory: desktop
        run: npm install --no-audit --no-fund

      - name: Build & publish (Windows NSIS)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: npx electron-builder --win --publish always

  # Mac/Linux — опционально, включаются переменными BUILD_MAC=1 / BUILD_LINUX=1
  build-mac:
    if: ${{ vars.BUILD_MAC == '1' }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - working-directory: desktop
        run: npm install --no-audit --no-fund
      - working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always

  build-linux:
    if: ${{ vars.BUILD_LINUX == '1' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - working-directory: desktop
        run: npm install --no-audit --no-fund
      - working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish always
