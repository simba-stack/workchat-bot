name: Desktop Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # Для первого релиза — собираем только Windows (быстро + не требует icns)
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache npm НЕ включаем — package-lock.json генерируется только после install

      - name: Install npm deps
        working-directory: desktop
        run: npm install

      - name: Build & publish to GitHub Releases (Windows)
        working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish -- --platform=win32

  # Опционально: Mac/Linux. Запускается параллельно, не блокирует Windows
  build-mac:
    if: ${{ vars.BUILD_MAC == '1' }}  # включи в Repo Settings → Variables
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: desktop
        run: npm install
      - working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish -- --platform=darwin

  build-linux:
    if: ${{ vars.BUILD_LINUX == '1' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get update && sudo apt-get install -y rpm fakeroot dpkg
      - working-directory: desktop
        run: npm install
      - working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish -- --platform=linux
