name: Desktop Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:  # позволяет запустить вручную из вкладки Actions

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # нужно для publisher-github (создание Release)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show desktop folder
        working-directory: desktop
        run: |
          dir
          node --version
          npm --version

      - name: Install npm deps
        working-directory: desktop
        run: npm install --no-audit --no-fund

      - name: Build & publish to GitHub Releases (Windows)
        working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-forge:*
        run: npm run publish

  # Mac/Linux отключены по умолчанию. Чтобы включить:
  # Repo Settings → Variables → New repository variable: BUILD_MAC=1 / BUILD_LINUX=1
  build-mac:
    if: ${{ vars.BUILD_MAC == '1' }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: desktop
        run: npm install --no-audit --no-fund
      - working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish

  build-linux:
    if: ${{ vars.BUILD_LINUX == '1' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get update && sudo apt-get install -y rpm fakeroot dpkg
      - working-directory: desktop
        run: npm install --no-audit --no-fund
      - working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish
