name: Python Healthcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile main .py files
        run: |
          set -e
          failures=0
          for f in $(find . -name "*.py" -not -path "./desktop/*" -not -path "./.git/*" -not -path "./guacamole/*"); do
            python -m py_compile "$f" 2>&1 || { echo "SYNTAX ERROR: $f"; failures=$((failures+1)); }
          done
          if [ $failures -gt 0 ]; then
            echo "$failures syntax errors"; exit 1
          fi
          echo "All main .py files compile"
      - name: Compile guacamole/ (info-only)
        continue-on-error: true
        run: |
          for f in $(find ./guacamole -name "*.py" 2>/dev/null); do
            python -m py_compile "$f" 2>&1 || echo "warn: $f"
          done

  imports:
    name: Module imports
    runs-on: ubuntu-latest
    needs: syntax
    env:
      BOT_TOKEN: "ci-dummy-token"
      API_ID: "1"
      API_HASH: "ci-dummy"
      ANTHROPIC_API_KEY: "ci-dummy"
      ADMIN_ID: "0"
      STORAGE_PATH: "/tmp/state.json"
      SESSION_SECRET: "ci-test-secret"
      DASHBOARD_USER: "x"
      DASHBOARD_PASS: "x"
      CRM_BOT_TOKEN: "0:dummy"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Import core modules
        run: |
          python << 'PY'
          import sys
          core = ["config","storage","accounting2","event_bus"]
          extended = ["brain","memory","userbot","learn","leo","admin_router","crm_bot","api"]
          critical = []
          warns = []
          for m in core:
              try:
                  __import__(m); print(f"OK  core {m}")
              except Exception as e:
                  print(f"FAIL core {m}: {e}"); critical.append((m, str(e)))
          for m in extended:
              try:
                  __import__(m); print(f"OK  ext  {m}")
              except Exception as e:
                  print(f"WARN ext  {m}: {e}"); warns.append((m, str(e)))
          if critical:
              print("=== CRITICAL CORE FAILURES ===")
              for m, e in critical: print(f"{m}: {e}")
              sys.exit(1)
          if warns:
              print(); print("=== Non-critical extended warnings ===")
              for m, e in warns: print(f"{m}: {e}")
          print("Core modules import cleanly")
          PY

  health:
    name: Health checks (advisory)
    runs-on: ubuntu-latest
    needs: imports
    continue-on-error: true
    env:
      BOT_TOKEN: "ci-dummy-token"
      API_ID: "1"
      API_HASH: "ci-dummy"
      ANTHROPIC_API_KEY: "ci-dummy"
      ADMIN_ID: "0"
      STORAGE_PATH: "/tmp/state.json"
      SESSION_SECRET: "ci-test-secret"
      DASHBOARD_USER: "x"
      DASHBOARD_PASS: "x"
      CRM_BOT_TOKEN: "0:dummy"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run offline health checks (advisory only)
        run: |
          python << 'PY'
          import sys
          try:
              from health_check import HealthChecker
          except Exception as e:
              print(f"Cannot import HealthChecker: {e}"); sys.exit(0)
          h = HealthChecker()
          for name in ["check_python_modules","check_userbot_methods","check_storage_methods",
                       "check_brain_tools","check_storage_state","check_workers_config","check_dashboard_html"]:
              fn = getattr(h, name, None)
              if fn:
                  try: fn()
                  except Exception as e: print(f"{name} threw: {e}")
          fails = [r for r in h.results if r.get("status") == "fail"]
          warns = [r for r in h.results if r.get("status") == "warn"]
          for r in h.results:
              em = {"ok":"OK","warn":"WARN","fail":"FAIL"}.get(r.get("status"), "?")
              print(f"{em} {r.get('name','?')} — {r.get('message','')}")
          print()
          print(f"Summary: OK={len(h.results)-len(fails)-len(warns)} WARN={len(warns)} FAIL={len(fails)}")
          if fails:
              print(); print("Health-check problems (informational, не блокирует деплой):")
              for r in fails:
                  print(f"  - {r.get('name')}: {r.get('message')}")
                  if r.get("fix_hint"):
                      print(f"    hint: {r['fix_hint']}")
          PY
