name: Deploy Guacamole to Railway

# =============================================================================
# Auto-deploy guacamole/ сервиса на Railway.
#
# Триггеры:
#   - push в main, если изменились файлы в guacamole/
#   - вручную через workflow_dispatch (Actions → Run workflow)
#
# Требуемые GitHub Secrets:
#   RAILWAY_TOKEN          — Account Token из Railway (Account Settings →
#                            Tokens → New Token). Полные права. Хранить ТОЛЬКО
#                            как GitHub secret, никогда в коде/чате.
#   RAILWAY_PROJECT_ID     — UUID проекта в Railway (из URL дашборда:
#                            railway.app/project/<UUID>)
#   RAILWAY_GUAC_SERVICE   — название сервиса (создай его один раз через UI:
#                            например "pride-guacamole"). Если не создан —
#                            workflow создаст автоматически при первом запуске.
#
# Один раз на старте: после первого деплоя зайди в Railway UI → Variables
# → выставить GUAC_ADMIN_PASS, PRIDE_GUAC_SECRET. См. guacamole/README.md.
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - "guacamole/**"
      - ".github/workflows/deploy-guacamole.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Railway service name (override RAILWAY_GUAC_SERVICE)"
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy guacamole/ to Railway
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set."
            echo "Add it at: Settings → Secrets and variables → Actions → New repository secret"
            echo "Get token at: railway.app → Account Settings → Tokens"
            exit 1
          fi
          if [ -z "${{ secrets.RAILWAY_PROJECT_ID }}" ]; then
            echo "::warning::RAILWAY_PROJECT_ID not set. Will use Railway default project for the token."
          fi

      - name: Setup Node.js (нужен для Railway CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli
          railway --version

      - name: Determine service name
        id: svc
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          if [ -z "$SERVICE" ]; then
            SERVICE="${{ secrets.RAILWAY_GUAC_SERVICE }}"
          fi
          if [ -z "$SERVICE" ]; then
            SERVICE="pride-guacamole"
          fi
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "Using service: $SERVICE"

      - name: Link project (optional)
        if: ${{ secrets.RAILWAY_PROJECT_ID != '' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd guacamole
          railway link --project ${{ secrets.RAILWAY_PROJECT_ID }} \
                       --service ${{ steps.svc.outputs.service }} \
                       --environment production || echo "Link warning — service may not exist yet"

      - name: Deploy guacamole/ via railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: guacamole
        run: |
          # railway up: загружает контекст и запускает build
          # --service: имя сервиса (если не существует — Railway создаст)
          # --detach: не ждём логов, просто triggering deploy
          railway up --service "${{ steps.svc.outputs.service }}" --detach || {
            echo ""
            echo "::warning::railway up failed. Possible reasons:"
            echo "  1. Service '${{ steps.svc.outputs.service }}' does not exist in the project yet."
            echo "     Create it manually first: Railway UI → New → Empty Service → name it '${{ steps.svc.outputs.service }}'"
            echo "  2. RAILWAY_TOKEN does not have access to RAILWAY_PROJECT_ID."
            echo "  3. Network/quota issue on Railway side."
            exit 1
          }

      - name: Post-deploy notes
        run: |
          echo "✅ Deploy triggered to Railway service '${{ steps.svc.outputs.service }}'"
          echo ""
          echo "Next manual steps (one-time):"
          echo "  1. Railway → Service '${{ steps.svc.outputs.service }}' → Settings → Networking → Generate Domain"
          echo "  2. Variables: GUAC_ADMIN_PASS=<strong>, PRIDE_GUAC_SECRET=<random>"
          echo "  3. Main service vars: GUACAMOLE_URL=<guac-domain>, PRIDE_GUAC_SECRET=<same>"
          echo "  4. After first start: log into Guacamole UI (guacadmin/guacadmin), change admin password"
          echo "     and update GUAC_ADMIN_PASS env to match."
