<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Выбери что шарить</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    background: #0a0e1a;
    color: #d6e3ff;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  .header {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: space-between;
  }
  .title { font-size: 14px; font-weight: 600; }
  .close-btn {
    background: transparent; color: #5b7299;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-family: inherit; font-size: 12px;
  }
  .close-btn:hover { background: rgba(255,255,255,0.05); color: #fb7185; }
  .tabs {
    display: flex; gap: 6px; padding: 10px 20px 0;
  }
  .tab {
    padding: 8px 16px; border-radius: 6px 6px 0 0;
    background: transparent; color: #5b7299;
    border: 1px solid transparent; border-bottom: none;
    cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500;
  }
  .tab.active {
    color: #00e5ff;
    background: rgba(0, 229, 255, 0.08);
    border-color: rgba(0, 229, 255, 0.3);
  }
  .grid-wrap {
    height: calc(100% - 100px);
    overflow-y: auto; padding: 16px 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .src {
    background: rgba(255,255,255,0.03);
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .src:hover {
    border-color: rgba(0, 229, 255, 0.5);
    background: rgba(0, 229, 255, 0.04);
    transform: translateY(-2px);
  }
  .src.selected {
    border-color: #00e5ff;
    box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.3);
  }
  .src-thumb {
    width: 100%; aspect-ratio: 16/10;
    background: #050818;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .src-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .src-info {
    padding: 8px 10px;
    display: flex; align-items: center; gap: 8px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .src-icon { width: 16px; height: 16px; }
  .src-name {
    font-size: 12px; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 20px; background: rgba(5, 8, 24, 0.95);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; gap: 10px; justify-content: flex-end;
    backdrop-filter: blur(10px);
  }
  .btn {
    padding: 8px 18px; border-radius: 6px;
    cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05); color: #d6e3ff;
  }
  .btn:hover { background: rgba(255,255,255,0.1); }
  .btn.primary {
    background: #00e5ff; color: #001824; border-color: #00e5ff;
  }
  .btn.primary:hover { filter: brightness(1.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty {
    padding: 60px 20px; text-align: center;
    color: #5b7299; font-size: 13px;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="title">🖥️ Выбери что транслировать</div>
    <button class="close-btn" onclick="cancel()">Отмена</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-screen" onclick="switchTab('screen')">🖥️ Экраны</button>
    <button class="tab" id="tab-window" onclick="switchTab('window')">🪟 Окна</button>
  </div>
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">Источники не найдены</div>
  </div>
  <div class="footer">
    <button class="btn" onclick="cancel()">Отмена</button>
    <button class="btn primary" id="share-btn" onclick="confirm()" disabled>Поделиться</button>
  </div>
<script>
  let sources = [];
  let currentTab = 'screen';
  let selectedId = null;

  // Sources passed via IPC после загрузки
  if (window.pridepicker && window.pridepicker.onSources) {
    window.pridepicker.onSources((srcs) => {
      sources = srcs || [];
      render();
    });
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-screen').classList.toggle('active', tab === 'screen');
    document.getElementById('tab-window').classList.toggle('active', tab === 'window');
    selectedId = null;
    document.getElementById('share-btn').disabled = true;
    render();
  }

  function render() {
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    grid.innerHTML = '';
    const filtered = sources.filter(s => {
      if (currentTab === 'screen') return s.id.startsWith('screen:');
      return s.id.startsWith('window:');
    });
    if (filtered.length === 0) {
      grid.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    grid.style.display = 'grid';
    empty.style.display = 'none';
    for (const s of filtered) {
      const el = document.createElement('div');
      el.className = 'src' + (selectedId === s.id ? ' selected' : '');
      el.onclick = () => select(s.id);
      el.ondblclick = () => { select(s.id); confirm(); };
      el.innerHTML = `
        <div class="src-thumb">
          ${s.thumbnail ? `<img src="${s.thumbnail}"/>` : '<div style="color:#5b7299;font-size:11px;">нет превью</div>'}
        </div>
        <div class="src-info">
          ${s.appIcon ? `<img class="src-icon" src="${s.appIcon}"/>` : ''}
          <div class="src-name" title="${escapeHtml(s.name)}">${escapeHtml(s.name)}</div>
        </div>
      `;
      grid.appendChild(el);
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function select(id) {
    selectedId = id;
    render();
    document.getElementById('share-btn').disabled = false;
  }

  function confirm() {
    if (!selectedId) return;
    if (window.pridepicker && window.pridepicker.confirm) {
      window.pridepicker.confirm(selectedId);
    }
  }

  function cancel() {
    if (window.pridepicker && window.pridepicker.cancel) {
      window.pridepicker.cancel();
    }
  }

  // ESC = cancel, Enter = confirm
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') cancel();
    if (e.key === 'Enter' && selectedId) confirm();
  });
</script>
</body>
</html>
