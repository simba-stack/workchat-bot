# nginx site config — единая точка входа.
# Слушает 9090 (Railway target port), маршрутизирует:
#   /api/proxy/* → 127.0.0.1:9000  (Python FastAPI auth-прокси)
#   /*           → 127.0.0.1:8080  (Tomcat → Guacamole webapp + WebSocket)
#
# Tomcat остаётся на default 8080 — не трогаем server.xml.

server {
    listen 9090 default_server;
    listen [::]:9090 default_server;
    server_name _;

    client_max_body_size 100M;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;

    # auth-прокси (динамические RDP-подключения)
    location /api/proxy/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Guacamole UI + WebSocket-туннель
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }
}
