# Запуск Postgres для E2E тестов:
#   docker compose -f docker-compose.test.yml up -d
#   export DATABASE_URL_TEST="postgresql+asyncpg://postgres:postgres@localhost:5432/p2p_test"
#   pytest tests/p2p -v
#   docker compose -f docker-compose.test.yml down -v
version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: p2p_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d p2p_test"]
      interval: 3s
      timeout: 3s
      retries: 20
