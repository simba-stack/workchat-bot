[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m scripts.run_all"
# healthcheckPath/Timeout убраны — Railway помечает deployment Active при старте контейнера.
# /health endpoint остаётся доступным, просто не блокирует deploy.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
